<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Rime — DAG flow hero with frost-pattern nodes">
  <defs>
    <!-- subtle dot-grid frost pattern for node interiors -->
    <pattern id="frost-dots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="0.7" fill="#2b7cb8" fill-opacity="0.25"/>
    </pattern>

    <!-- soft gradient backdrop -->
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fafcfe"/>
      <stop offset="100%" stop-color="#f1f6fa"/>
    </linearGradient>

    <!-- arrowhead marker for edges -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,5 L0,10 Z" fill="#2b7cb8"/>
    </marker>

    <!-- horizon line decoration -->
    <linearGradient id="horizon" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2b7cb8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2b7cb8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2b7cb8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- decorative horizon ridges (subtle frost lines) -->
  <line x1="0" y1="450" x2="1600" y2="450" stroke="url(#horizon)" stroke-width="1"/>
  <line x1="0" y1="180" x2="1600" y2="180" stroke="url(#horizon)" stroke-width="0.5"/>
  <line x1="0" y1="720" x2="1600" y2="720" stroke="url(#horizon)" stroke-width="0.5"/>

  <!-- ============================================================
       EDGES (drawn first so nodes sit on top)
       ============================================================ -->
  <g stroke="#2b7cb8" stroke-width="2.2" fill="none" marker-end="url(#arrow)" opacity="0.85">
    <!-- sql_cars -> feature_build -->
    <path d="M 360,250 C 520,250 540,400 690,400"/>
    <!-- py_co2 -> feature_build -->
    <path d="M 360,450 C 520,450 540,420 690,420"/>
    <!-- py_co2 -> umap_embed -->
    <path d="M 360,470 C 520,470 540,600 690,600"/>
    <!-- r_efficiency -> umap_embed -->
    <path d="M 360,670 C 520,670 540,620 690,620"/>
    <!-- feature_build -> t_test -->
    <path d="M 870,400 C 1020,400 1040,330 1190,330"/>
    <!-- umap_embed -> t_test -->
    <path d="M 870,600 C 1020,600 1040,360 1190,360"/>
    <!-- feature_build -> report (lower right) -->
    <path d="M 870,420 C 1020,420 1040,580 1190,580"/>
    <!-- t_test -> report -->
    <path d="M 1370,360 C 1430,360 1230,540 1190,580"/>
  </g>

  <!-- ============================================================
       NODES — three columns
       Each node: rounded rect with frost-pattern fill, dark text
       ============================================================ -->

  <!-- Column 1: sources -->
  <g>
    <!-- sql_cars -->
    <g transform="translate(200,210)">
      <rect width="160" height="80" rx="10" fill="#ffffff" stroke="#0a3d5f" stroke-width="1.5"/>
      <rect width="160" height="80" rx="10" fill="url(#frost-dots)"/>
      <rect x="0" y="0" width="6" height="80" rx="3" fill="#2b7cb8"/>
      <text x="22" y="34" font-family="Inter Tight, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2b7cb8" letter-spacing="1.5">SQL</text>
      <text x="22" y="58" font-family="Inter Tight, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0a3d5f">sql_cars</text>
    </g>
    <!-- py_co2 -->
    <g transform="translate(200,410)">
      <rect width="160" height="80" rx="10" fill="#ffffff" stroke="#0a3d5f" stroke-width="1.5"/>
      <rect width="160" height="80" rx="10" fill="url(#frost-dots)"/>
      <rect x="0" y="0" width="6" height="80" rx="3" fill="#2b7cb8"/>
      <text x="22" y="34" font-family="Inter Tight, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2b7cb8" letter-spacing="1.5">PYTHON</text>
      <text x="22" y="58" font-family="Inter Tight, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0a3d5f">fetch_co2</text>
    </g>
    <!-- r_efficiency -->
    <g transform="translate(200,630)">
      <rect width="160" height="80" rx="10" fill="#ffffff" stroke="#0a3d5f" stroke-width="1.5"/>
      <rect width="160" height="80" rx="10" fill="url(#frost-dots)"/>
      <rect x="0" y="0" width="6" height="80" rx="3" fill="#2b7cb8"/>
      <text x="22" y="34" font-family="Inter Tight, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2b7cb8" letter-spacing="1.5">R</text>
      <text x="22" y="58" font-family="Inter Tight, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0a3d5f">efficiency</text>
    </g>
  </g>

  <!-- Column 2: transforms -->
  <g>
    <!-- feature_build -->
    <g transform="translate(690,360)">
      <rect width="180" height="80" rx="10" fill="#ffffff" stroke="#0a3d5f" stroke-width="1.5"/>
      <rect width="180" height="80" rx="10" fill="url(#frost-dots)"/>
      <rect x="0" y="0" width="6" height="80" rx="3" fill="#0a3d5f"/>
      <text x="22" y="34" font-family="Inter Tight, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2b7cb8" letter-spacing="1.5">TRANSFORM</text>
      <text x="22" y="58" font-family="Inter Tight, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0a3d5f">feature_build</text>
    </g>
    <!-- umap_embed -->
    <g transform="translate(690,560)">
      <rect width="180" height="80" rx="10" fill="#ffffff" stroke="#0a3d5f" stroke-width="1.5"/>
      <rect width="180" height="80" rx="10" fill="url(#frost-dots)"/>
      <rect x="0" y="0" width="6" height="80" rx="3" fill="#0a3d5f"/>
      <text x="22" y="34" font-family="Inter Tight, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2b7cb8" letter-spacing="1.5">PYTHON</text>
      <text x="22" y="58" font-family="Inter Tight, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0a3d5f">umap_embed</text>
    </g>
  </g>

  <!-- Column 3: terminal nodes (stats + report) -->
  <g>
    <!-- t_test (statistical) -->
    <g transform="translate(1190,300)">
      <rect width="180" height="80" rx="10" fill="#d4e7f5" stroke="#0a3d5f" stroke-width="1.5"/>
      <rect x="0" y="0" width="6" height="80" rx="3" fill="#2b7cb8"/>
      <text x="22" y="34" font-family="Inter Tight, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0a3d5f" letter-spacing="1.5">STATISTIC</text>
      <text x="22" y="58" font-family="Inter Tight, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0a3d5f">t_test</text>
    </g>
    <!-- report (HTML output) -->
    <g transform="translate(1190,540)">
      <rect width="200" height="100" rx="12" fill="#0a3d5f"/>
      <text x="22" y="36" font-family="Inter Tight, system-ui, sans-serif" font-size="11" font-weight="600" fill="#d4e7f5" letter-spacing="1.5">REPORT</text>
      <text x="22" y="64" font-family="Inter Tight, system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff">narrative.html</text>
      <!-- tiny doc lines -->
      <line x1="22" y1="78" x2="160" y2="78" stroke="#d4e7f5" stroke-width="1.5" opacity="0.6"/>
      <line x1="22" y1="86" x2="120" y2="86" stroke="#d4e7f5" stroke-width="1.5" opacity="0.4"/>
    </g>
  </g>

  <!-- ============================================================
       Wordmark + tagline (top-left corner)
       ============================================================ -->
  <g transform="translate(80,80)">
    <text font-family="Inter Tight, system-ui, sans-serif" font-size="56" font-weight="700" letter-spacing="-2" fill="#0a3d5f">rime</text>
    <text y="36" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="2" fill="#2b7cb8">DATA · DAGS · NARRATIVES</text>
  </g>

  <!-- subtle column labels -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" letter-spacing="2" fill="#2b7cb8" opacity="0.55">
    <text x="240" y="800">SOURCES</text>
    <text x="730" y="800">TRANSFORMS</text>
    <text x="1230" y="800">OUTPUTS</text>
  </g>
</svg>
