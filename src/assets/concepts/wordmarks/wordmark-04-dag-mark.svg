<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80" role="img" aria-label="rime — DAG glyph + wordmark">
  <rect width="240" height="80" fill="#ffffff"/>

  <!-- 3-node DAG glyph on the left: two source nodes feeding into one terminal node -->
  <g transform="translate(12, 18)">
    <!-- edges first (so dots sit on top) -->
    <line x1="12" y1="12" x2="40" y2="32" stroke="#2b7cb8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="44" x2="40" y2="32" stroke="#2b7cb8" stroke-width="2.5" stroke-linecap="round"/>
    <!-- nodes -->
    <circle cx="12" cy="12" r="6.5" fill="#0a3d5f"/>
    <circle cx="12" cy="44" r="6.5" fill="#0a3d5f"/>
    <circle cx="40" cy="32" r="8.5" fill="#2b7cb8" stroke="#0a3d5f" stroke-width="2"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="54"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter Tight', system-ui, sans-serif"
        font-weight="600"
        font-size="44"
        letter-spacing="-1"
        fill="#0a3d5f">rime</text>

  <!-- subtle tagline beneath, optional -->
  <text x="80" y="68"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif"
        font-weight="400"
        font-size="10"
        letter-spacing="2"
        fill="#2b7cb8">DATA · DAGS · NARRATIVES</text>
</svg>
